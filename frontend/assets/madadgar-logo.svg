<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5A1F" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FF3D00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="arcStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="800" height="500" fill="#000000"/>

  <!-- Orange glow underneath the mark -->
  <ellipse cx="470" cy="320" rx="240" ry="110" fill="url(#orangeGlow)" opacity="0.95"/>
  <ellipse cx="500" cy="340" rx="160" ry="60" fill="#FF6A1A" opacity="0.55"/>

  <!-- Logo mark: helpful arc / shelter shape -->
  <g transform="translate(400, 250)" filter="url(#softGlow)">
    <!-- Outer arc shelter (two peaks meeting in the middle) -->
    <path d="
        M -150 30
        C -150 -40, -90 -90, -20 -90
        C -10 -90, -5 -85, 0 -75
        C 5 -85, 10 -90, 20 -90
        C 90 -90, 150 -40, 150 30
        L 130 30
        C 130 -25, 85 -65, 25 -65
        C 15 -65, 8 -55, 0 -40
        C -8 -55, -15 -65, -25 -65
        C -85 -65, -130 -25, -130 30
        Z"
      fill="url(#arcStroke)" stroke="#000" stroke-width="3" stroke-linejoin="round"/>

    <!-- Inner diamond/sparkle pocket cutout suggestion (white v-shape down) -->
    <path d="
        M -28 -38
        C -18 -20, -8 -2, 0 40
        C 8 -2, 18 -20, 28 -38
        C 14 -28, -14 -28, -28 -38 Z"
      fill="#FFFFFF" stroke="#000" stroke-width="3" stroke-linejoin="round"/>

    <!-- 4-point sparkle star in the middle -->
    <path d="
        M 0 -55
        L 8 -8
        L 55 0
        L 8 8
        L 0 55
        L -8 8
        L -55 0
        L -8 -8 Z"
      fill="#000000"/>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark: Madadgar -->
  <text x="400" y="410"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="54"
        font-weight="700"
        letter-spacing="6"
        fill="#FFFFFF">MADADGAR</text>

  <!-- Tagline -->
  <text x="400" y="450"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="18"
        font-weight="400"
        letter-spacing="4"
        fill="#FF6A1A">Find help.  Book service.  Relax.</text>
</svg>
